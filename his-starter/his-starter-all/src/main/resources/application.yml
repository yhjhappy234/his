server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: his-application

  # SQLite数据库配置
  datasource:
    url: jdbc:sqlite:./data/his.db
    driver-class-name: org.sqlite.JDBC

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.community.dialect.SQLiteDialect

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # 缓存配置
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

# 日志配置
logging:
  level:
    root: INFO
    com.his: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# HIS系统配置
his:
  system:
    name: HIS医院信息系统
    version: 1.0.0
    description: 新一代智慧医院信息系统
  # 默认用户配置
  default:
    username: admin
    password: 123456
  # 时区配置（默认中国上海时区）
  timezone: Asia/Shanghai