server:
  port: 8084

spring:
  application:
    name: his-module-pharmacy
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:data/his_pharmacy.db
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: pharmacy_schema_history
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    com.yhj.his: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html